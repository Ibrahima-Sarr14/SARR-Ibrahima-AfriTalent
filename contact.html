    <main>
        <section id="contact">
            <div class="container py-5">
                <h1>Contactez-nous</h1>
                <div class="row">

                    <div class="col-md-6">
                        <form id="contactForm">
                            <div class="mb-3">
                                <label for="nom" class="form-label">Nom</label>
                                <input type="text" class="form-control" id="nom" placeholder="votre nom">
                            </div>
                             <div class="mb-3">
                                <label for="prenom" class="form-label">Prénom</label>
                                <input type="text" class="form-control" id="prénom" placeholder="votre prénom">
                            </div>
                             <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="votre@email.com">
                            </div>
                            <div class="mb-3">
                                <label for="sujet" class="form-label">Sujet</label>
                                <select class="form-select" id="sujet">
                                    <option value="">Choisissez un sujet</option>
                                    <option value="info">Demande d'information</option>
                                    <option value="support">Support technique</option>
                                    <option value="partenariat">Parrtenariat</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea  class="form-control" id="message" rows="4" placeholder="Votre mesaage..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Envoyer</button>
                        </form>
                    </div>

                    <div class="col-md-6">
                        <h4>Nos coordonnées</h4>
                        <p>📧Contact@afriTalent.com</p>
                        <p>📞+221 77 123 45 67 </p>
                        <p>📍Dakar, Sénégal</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
